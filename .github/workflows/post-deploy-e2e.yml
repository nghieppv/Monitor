name: Post Deploy E2E

on:
  deployment_status:

jobs:
  e2e:
    if: github.event.deployment_status.state == 'success' && github.event.deployment_status.environment_url != ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run deployed smoke tests
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event.deployment_status.environment_url }}
          PLAYWRIGHT_CLEANUP_SECRET: ${{ secrets.CRON_SECRET }}
        run: npm run test:e2e:smoke

      - name: Run deployed CRUD tests
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event.deployment_status.environment_url }}
          PLAYWRIGHT_CLEANUP_SECRET: ${{ secrets.CRON_SECRET }}
        run: npm run test:e2e:production

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-post-deploy
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
